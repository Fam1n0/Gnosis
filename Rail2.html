<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advantage Welding - Master Scaled Blueprint</title>
    <style>
        :root {
            --bg-dark: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --alert: #cf6679;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        header {
            background-color: var(--surface);
            padding: 1.5rem;
            text-align: center;
            border-bottom: 2px solid var(--primary);
        }

        header h1 { margin: 0; color: var(--primary); }
        header p { margin: 0.5rem 0 0 0; color: var(--text-muted); }

        .control-panel {
            background-color: #252525;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            border-bottom: 1px solid var(--border);
        }

        select {
            background-color: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--primary);
            padding: 0.5rem 1rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .viewer-container {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .canvas-wrapper {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .map-wrapper {
            display: flex;
            justify-content: center;
            background-color: #1a1a1a;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid #2a2a2a;
        }

        .canvas-title {
            color: var(--secondary);
            margin-top: 0;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
        }

        canvas {
            display: block;
        }

        #topCanvas, #sideCanvas {
            background-color: #1a1a1a;
        }

        .stats-bar {
            display: flex;
            gap: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Advantage Welding Interactive Blueprint</h1>
        <p>Proportional Spatial Layout Visualizer</p>
    </header>

    <div class="control-panel">
        <label for="runSelect"><strong>Select Structural Section:</strong></label>
        <select id="runSelect" onchange="renderViews()">
            <option value="1A">Section 1A (29' Collinear Top)</option>
            <option value="2A">Section 2A (187.5" Collinear Middle)</option>
            <option value="3A">Section 3A (16' Collinear Bottom)</option>
            <option value="4C">Section 4C (42' 6¼" T-Junction)</option>
            <option value="1C">Section 1C (96' Deck Run)</option>
            <option value="1B">Section 1B (15.5' Right Return)</option>
            <option value="2B">Section 2B (119" from Stairs)</option>
            <option value="3C">Section 3C (79' Transition Run)</option>
        </select>
    </div>

    <div class="viewer-container">
        
        <div class="canvas-wrapper">
            <h2 class="canvas-title">
                SITE TOPOLOGY REFERENCE
                <div class="stats-bar"><span>Abstract Scale Legend</span></div>
            </h2>
            <div class="map-wrapper">
                <canvas id="staticMapCanvas" width="800" height="300"></canvas>
            </div>
        </div>

        <div class="canvas-wrapper">
            <h2 class="canvas-title">
                TOP-DOWN VIEW
                <div class="stats-bar" id="topStats"></div>
            </h2>
            <canvas id="topCanvas" height="150"></canvas>
        </div>

        <div class="canvas-wrapper">
            <h2 class="canvas-title">
                SIDE ELEVATION
                <div class="stats-bar" id="sideStats"></div>
            </h2>
            <canvas id="sideCanvas" height="350"></canvas>
        </div>

    </div>

    <script>
        // Mathematical parameters
        const projectData = {
            "1A": { length: 348, type: "18", marks: [7, 60, 108, 156, 204, 252, 300, 348] },
            "1B": { length: 186, type: "42", marks: [7, 55, 103, 151, 179] },
            "1C": { length: 1152, type: "42", marks: [7, 55, 103, 151, 199, 247, 295, 343, 391, 439, 487, 535, 583, 631, 679, 727, 775, 823, 871, 919, 967, 1015, 1063, 1111, 1145] },
            "2A": { length: 187.5, type: "18", marks: [7, 55, 103, 151, 180.5] },
            "2B": { length: 119, type: "18", marks: [7, 42, 77, 112] },
            "3A": { length: 192, type: "42", marks: [7, 55, 103, 151, 185] },
            "3C": { length: 948, type: "mixed", transition: 624, marks: [7, 55, 103, 151, 199, 247, 295, 343, 391, 439, 487, 535, 583, 624, 672, 720, 768, 816, 864, 912, 941] },
            "4C": { length: 510.25, type: "18", marks: [7, 55, 103, 151, 199, 247, 295, 343, 391, 439, 487, 503.25] }
        };

        // Scale: 1 inch physical = 3 pixels on screen
        const PPI = 3; 
        const PADDING = 50;

        function drawStaticMap() {
            const canvas = document.getElementById('staticMapCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Abstract Coordinates for lines reflecting the geometric enclosure
            const lines = [
                { start: [150, 40], end: [150, 100], label: "1A", lPos: [125, 75] },
                { start: [150, 100], end: [150, 170], label: "2A", lPos: [125, 140] },
                { start: [150, 170], end: [150, 240], label: "3A", lPos: [125, 210] },
                { start: [150, 100], end: [400, 100], label: "4C", lPos: [275, 90] },
                { start: [150, 240], end: [550, 240], label: "1C", lPos: [350, 255] },
                { start: [550, 240], end: [550, 160], label: "1B", lPos: [575, 205] },
                { start: [400, 160], end: [700, 160], label: "3C", lPos: [550, 150] },
                { start: [300, 160], end: [300, 200], label: "2B", lPos: [275, 185] }
            ];

            ctx.lineWidth = 3;
            ctx.strokeStyle = '#666';

            lines.forEach(line => {
                ctx.beginPath();
                ctx.moveTo(line.start[0], line.start[1]);
                ctx.lineTo(line.end[0], line.end[1]);
                ctx.stroke();

                ctx.fillStyle = '#a0a0a0';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(line.label, line.lPos[0], line.lPos[1]);
            });

            // Nodes
            const nodes = [
                [150, 40], [150, 100], [400, 100], // Top row / T-Junction
                [150, 240], [550, 240], [550, 160], // Bottom row / Right Return
                [400, 160], [700, 160], // 3C run
                [300, 160], [300, 200] // Stairs/2B
            ];

            nodes.forEach(node => {
                ctx.beginPath();
                ctx.arc(node[0], node[1], 4, 0, 2 * Math.PI);
                ctx.fillStyle = '#bb86fc';
                ctx.fill();
            });

            // Transitions (2A to 3A step down)
            const transitions = [[150, 170]]; 
            transitions.forEach(t => {
                ctx.fillStyle = '#cf6679';
                ctx.fillRect(t[0]-4, t[1]-4, 8, 8);
            });
        }

        function renderViews() {
            const runId = document.getElementById('runSelect').value;
            const data = projectData[runId];
            
            const totalPixels = (data.length * PPI) + (PADDING * 2);
            
            document.getElementById('topStats').innerHTML = `<span>Total Length: ${data.length}"</span> <span>Posts: ${data.marks.length}</span>`;
            document.getElementById('sideStats').innerHTML = `<span>Scale: 1" = 3px</span>`;

            drawTopView(totalPixels, data);
            drawSideView(totalPixels, data);
        }

        function drawTopView(width, data) {
            const canvas = document.getElementById('topCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = width;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const startY = 40;
            const wallWidth = 14 * PPI;
            const postSize = 2 * PPI;
            const centerLine = startY + (7 * PPI);

            ctx.fillStyle = '#333';
            ctx.fillRect(PADDING, startY, data.length * PPI, wallWidth);
            ctx.strokeStyle = '#555';
            ctx.strokeRect(PADDING, startY, data.length * PPI, wallWidth);

            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.moveTo(PADDING, centerLine);
            ctx.lineTo(PADDING + (data.length * PPI), centerLine);
            ctx.strokeStyle = '#03dac6';
            ctx.stroke();
            ctx.setLineDash([]); 

            ctx.fillStyle = '#bb86fc';
            ctx.textAlign = 'center';
            ctx.font = '12px Arial';

            for (let i = 0; i < data.marks.length; i++) {
                let mark = data.marks[i];
                let xPos = PADDING + (mark * PPI);
                
                ctx.fillRect(xPos - (postSize/2), centerLine - (postSize/2), postSize, postSize);
                
                ctx.fillStyle = '#e0e0e0';
                ctx.fillText(`${mark}"`, xPos, startY - 10);
                ctx.fillStyle = '#bb86fc';

                if (i < data.marks.length - 1) {
                    let nextMark = data.marks[i+1];
                    let nextX = PADDING + (nextMark * PPI);
                    let midX = xPos + ((nextX - xPos) / 2);
                    let interval = (nextMark - mark).toFixed(1);
                    
                    ctx.fillStyle = '#a0a0a0';
                    ctx.fillText(`< ${interval}" >`, midX, startY + wallWidth + 20);
                    ctx.fillStyle = '#bb86fc';
                }
            }
        }

        function drawSideView(width, data) {
            const canvas = document.getElementById('sideCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = width;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const groundY = 300;
            const postWidth = 2 * PPI;
            
            ctx.fillStyle = '#444';
            ctx.fillRect(PADDING, groundY, data.length * PPI, 20);

            ctx.fillStyle = '#bb86fc';

            for (let i = 0; i < data.marks.length; i++) {
                let mark = data.marks[i];
                let xPos = PADDING + (mark * PPI);
                
                let heightInches = 18;
                if (data.type === '42') heightInches = 42;
                if (data.type === 'mixed') heightInches = (mark >= data.transition) ? 42 : 18;

                let pxHeight = heightInches * PPI;
                let postTopY = groundY - pxHeight;

                ctx.fillRect(xPos - (postWidth/2), postTopY, postWidth, pxHeight);

                let bpWidth = 4 * PPI;
                ctx.fillRect(xPos - (bpWidth/2), groundY - 4, bpWidth, 4);

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                
                let numCables = (heightInches === 42) ? 13 : 5;
                let cableSpacing = pxHeight / (numCables + 1);
                let cableEndX = xPos;
                
                if (i < data.marks.length - 1) {
                    cableEndX = PADDING + (data.marks[i+1] * PPI);
                    let nextHeight = 18;
                    if (data.type === '42') nextHeight = 42;
                    if (data.type === 'mixed') nextHeight = (data.marks[i+1] >= data.transition) ? 42 : 18;

                    let maxDrawCables = Math.min(numCables, (nextHeight === 42 ? 13 : 5));

                    for (let c = 1; c <= maxDrawCables; c++) {
                        ctx.beginPath();
                        ctx.moveTo(xPos, postTopY + (c * cableSpacing));
                        ctx.lineTo(cableEndX, postTopY + (c * cableSpacing));
                        ctx.stroke();
                    }
                }
            }

            ctx.fillStyle = '#03dac6';
            let railHeight = 2 * PPI; 
            
            if(data.type !== 'mixed') {
                let yRail = groundY - (data.type === '42' ? 42*PPI : 18*PPI) - railHeight;
                ctx.fillRect(PADDING, yRail, data.length * PPI, railHeight);
            } else {
                ctx.fillRect(PADDING, groundY - (18*PPI) - railHeight, (data.transition) * PPI, railHeight);
                ctx.fillRect(PADDING + (data.transition * PPI), groundY - (42*PPI) - railHeight, (data.length - data.transition) * PPI, railHeight);
            }
        }

        window.onload = () => {
            drawStaticMap();
            renderViews();
        };
    </script>
</body>
</html>
